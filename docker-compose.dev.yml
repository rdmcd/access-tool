x-python-service:
  &x-python-service
  user: "1000:1000"
  depends_on:
    redis:
      condition: service_healthy
    postgres:
      condition: service_started
  networks:
    - internal


services:
  api:
    <<: *x-python-service
    build:
      context: .
      dockerfile: ./config/docker/Dockerfile.api
    image: access-api
    env_file:
      - ./config/env/.api.env
      - ./config/env/.core.env
    container_name: "access-api"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/api:/app/api
      - ./backend/core:/app/core
    command: [ "uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4", "--reload", "--log-level=info" ]


  nginx:
    image: "nginx:stable"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./config/certs:/etc/nginx/certs
    networks:
      - internal
    depends_on:
      - api
      - frontend

  frontend:
    image: "access-frontend"
    pull_policy: never
    build:
      context: .
      dockerfile: ./config/docker/Dockerfile.frontend-dev
    container_name: "access-frontend"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/.env:/app/.env
    networks:
      - internal
